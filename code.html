<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Код подтверждения</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 20px; background: #1c1c1e; color: #fff;">
    <h3>Введите код из SMS</h3>
    <input type="text" id="code" inputmode="numeric" maxlength="8" placeholder="12345"
           style="font-size: 22px; padding: 10px; width: 100%; box-sizing: border-box;">
    <br><br>
    <button id="submitBtn" onclick="sendCode()" style="font-size: 20px; padding: 12px 30px;">Подтвердить</button>

    <script>
        // Дождёмся полной загрузки
        window.addEventListener('load', function() {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
            } else {
                alert('Telegram WebApp не поддерживается. Откройте страницу внутри Telegram.');
            }
        });

        function sendCode() {
            const code = document.getElementById('code').value.trim();
            if (code.length < 4) {
                alert('Введите код (минимум 4 цифры)');
                return;
            }
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Отправка...';

            if (!window.Telegram || !Telegram.WebApp || typeof Telegram.WebApp.sendData !== 'function') {
                alert('WebApp API недоступен. Попробуйте обновить страницу и нажать кнопку «Ввести код» еще раз.');
                btn.disabled = false;
                btn.textContent = 'Подтвердить';
                return;
            }

            try {
                Telegram.WebApp.sendData(JSON.stringify({ code: code }));
                // Убедимся, что данные ушли (alert появится только если sendData сработал)
                alert('Код успешно отправлен! Окно закроется автоматически.');
                // Даём время на отображение alert, потом закрываем
                setTimeout(function() {
                    Telegram.WebApp.close();
                }, 500);
            } catch (e) {
                alert('Ошибка отправки: ' + e.message + '\nПопробуйте еще раз.');
                btn.disabled = false;
                btn.textContent = 'Подтвердить';
            }
        }
    </script>
</body>
</html>
